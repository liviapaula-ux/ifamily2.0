
    <style>
        html { scroll-behavior: smooth; }
        .hidden-view { display: none !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #EA1D2C; border-radius: 4px; }
        
        /* Estilos da Timeline na Home */
        .timeline-item.active .timeline-icon {
            background-color: #EA1D2C;
            color: white;
            border-color: #EA1D2C;
            transform: scale(1.15);
        }
        .timeline-item.active .timeline-title {
            color: #EA1D2C;
            font-weight: 700;
        }
        
        .hover-card { transition: all 0.3s ease; }
        .hover-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            background-color: #EA1D2C;
            color: white;
            font-weight: 600;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(234, 29, 44, 0.2);
        }
        .btn-action:hover { background-color: #cc1725; transform: translateY(-2px); }

        /* Estilo para links em destaque nos serviços */
        .featured-link-box {
            background-color: #FEE2E2;
            border: 1px solid #FCA5A5;
            padding: 0.75rem;
            border-radius: 0.75rem;
            text-align: center;
            font-weight: 700;
            color: #EA1D2C;
            display: block;
            margin-top: auto;
            transition: all 0.2s ease;
        }
        .featured-link-box:hover {
            background-color: #EA1D2C;
            color: white;
        }

        /* Ilustrações de Kits - Contornos Vermelhos */
        .kit-illustration-circle {
            background-color: white;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            width: 48px;
            margin-bottom: 1rem;
            border: 1px solid #F3F4F6;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Roadmap Steps */
        .kit-step::after {
            content: '';
            position: absolute;
            left: 24px;
            top: 48px;
            width: 2px;
            height: calc(100% - 20px);
            background-color: #F3F4F6;
            z-index: 0;
        }
        .kit-step:last-child::after { display: none; }
        
        details summary::-webkit-details-marker { display:none; }
        .modal-active { overflow: hidden; }
    </style>
</head>
